# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# Kafka Producer Properties
# Referenced by: kafka_local_server.properties
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=

# Serializers
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Acknowledgement mode:
#   0 = fire and forget (no ack)
#   1 = leader ack only
#   all = full ISR ack (strongest guarantee)
acks=all

# Number of times the producer will retry a failed send
retries=3

# How long (ms) the producer will wait to batch records before sending
linger.ms=1

# Maximum size of a single request in bytes (1MB default)
max.request.size=1048576
