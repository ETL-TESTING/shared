# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# Kafka Consumer Properties
# Referenced by: kafka_local_server.properties
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=

# Deserializers
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Consumer group ID
group.id=steply-order-test-group

# Where to start reading when no committed offset exists:
#   earliest = read from the beginning of the topic
#   latest   = read only new messages from now
auto.offset.reset=earliest

# Disable auto-commit — Steply controls commits via commitSync/commitAsync above
enable.auto.commit=false

# Maximum number of records returned in a single poll
max.poll.records=10
