# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# Kafka bootstrap servers comma-separated if multi-broker
# e.g. localhost:9092,host2:9093
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
kafka.bootstrap.servers=localhost:9092

# Delegate to separate producer and consumer config files
kafka.producer.properties=env/kafka_producer.properties
kafka.consumer.properties=env/kafka_consumer.properties

# --------------------------------------------------------------------
# Optional consumer settings — common/central to all test cases.
# These can be overridden locally within individual test steps.
# --------------------------------------------------------------------

# Commit mode: set one of these to true, never both
consumer.commitSync=true
consumer.commitAsync=false

# Dump all consumed records to this file (relative or absolute path)
consumer.fileDumpTo=target/temp/order_topic_dump.txt

# Set to true to include each record body in the response output.
# Set to false when dealing with large volumes (only record count matters)
consumer.showRecordsConsumed=true

# Max number of retry polls when no records are returned before giving up
consumer.maxNoOfRetryPollsOrTimeouts=5

# How long (ms) each poll waits before the next retry
consumer.pollingTime=1000
